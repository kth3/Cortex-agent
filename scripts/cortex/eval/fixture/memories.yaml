# 평가 fixture — knowledge 도메인 메모리 데이터 (저장소 동봉, 사용자 워크스페이스와 무관)
# 골든셋의 expected_keys는 이 파일의 key 값을 참조한다.
#
# 작성 원칙: 모든 항목은 cortex 엔진이 다루는 기술 도메인의 일반 사실만 담는다.
# 사용자 개인 컨벤션, 이 프로젝트의 정책·결정·작업 컨텍스트는 포함하지 않는다.

- key: skill.rrf-tuning
  category: skill
  content: "RRF(Reciprocal Rank Fusion)의 k 파라미터는 60이 표준이며, 값이 낮을수록 상위권 결과의 가중치가 커진다."
  tags: ["search", "rrf", "ranking"]

- key: skill.fts5-prefix-query
  category: skill
  content: "FTS5 MATCH 절에서 prefix 검색은 토큰 끝에 별표를 붙여 표현한다. 정규화 함수가 사용자 입력을 안전하게 변환한다."
  tags: ["search", "fts", "sqlite"]

- key: skill.sqlite-vec-extension
  category: skill
  content: "sqlite-vec 확장은 enable_load_extension(True) 후 sqlite_vec.load(conn)로 활성화한다. 확장 로드에 실패하면 시스템은 FTS5만으로 fallback 동작한다."
  tags: ["search", "sqlite", "vec"]

- key: skill.tree-sitter-grammar
  category: skill
  content: "Tree-sitter는 언어별 grammar wheel을 import해 Parser.set_language로 주입한다. 노드 순회는 walk() cursor 기반 탐색을 사용한다."
  tags: ["parser", "tree-sitter"]

- key: protocol.edge-resolution-priority
  category: protocol
  content: "엣지 해소는 네 단계 우선순위로 동작한다. Priority 1은 fqn_hint, Priority 2는 language와 kind hint, Priority 3은 language only, Priority 4는 name only fallback이다."
  tags: ["indexing", "edges"]

- key: protocol.fts-trigger-sync
  category: protocol
  content: "FTS5 가상 테이블은 content 테이블의 INSERT·UPDATE·DELETE 트리거로 자동 동기화한다. 트리거가 없거나 누락되면 검색 인덱스가 stale 상태가 된다."
  tags: ["fts", "sqlite", "trigger"]

- key: protocol.schema-migration
  category: protocol
  content: "SQLite 스키마 마이그레이션은 PRAGMA table_info로 현재 컬럼을 조회한 뒤 누락된 컬럼만 ALTER TABLE ADD COLUMN으로 추가하는 멱등 패턴으로 적용한다."
  tags: ["sqlite", "migration"]

- key: pattern.connection-finally-close
  category: pattern
  content: "SQLite 연결은 작업 종료 시 finally 블록에서 conn.close()를 호출하여 자원 누수와 WAL 파일 락 점유를 방지한다."
  tags: ["sqlite", "lifecycle"]

# === Distractor 메모리 (정답과 FTS 토큰이 겹치지만 정답이 아닌 항목) ===

- key: insight.rrf-latency-tradeoff
  category: insight
  content: "RRF 병합은 두 검색 결과를 순회하므로 단일 소스 대비 latency가 증가한다. k 값이 클수록 순위 차이가 완만해져 소스 간 균형이 맞지만 상위권 정밀도가 떨어진다."
  tags: ["search", "rrf", "performance"]

- key: insight.fts5-tokenizer-locale
  category: insight
  content: "FTS5 기본 unicode61 토크나이저는 한국어 형태소 분석을 지원하지 않는다. prefix 검색으로 부분 보완이 가능하지만 조사 분리는 불완전하다."
  tags: ["fts", "sqlite", "i18n"]

- key: insight.sqlite-wal-checkpoint
  category: insight
  content: "sqlite WAL 모드에서 체크포인트가 지연되면 WAL 파일이 무한히 커질 수 있다. 주기적으로 PRAGMA wal_checkpoint(TRUNCATE)를 호출하여 디스크 사용량을 관리한다."
  tags: ["sqlite", "wal", "maintenance"]

- key: insight.tree-sitter-error-recovery
  category: insight
  content: "Tree-sitter 파서는 구문 오류가 있는 소스에서도 부분 파싱을 수행한다. ERROR 노드가 나타나면 해당 범위의 grammar 복구를 시도하되, 자식 노드는 신뢰할 수 없다."
  tags: ["parser", "tree-sitter", "error-handling"]

- key: insight.edge-cycle-detection
  category: insight
  content: "edge 그래프에 순환 참조가 존재하면 resolution 무한 루프가 발생할 수 있다. 방문 집합(visited set)으로 사이클을 탐지하고 해당 edge를 unresolved 상태로 남긴다."
  tags: ["indexing", "edges", "graph"]

- key: insight.fts-rebuild-performance
  category: insight
  content: "FTS5 인덱스의 trigger 기반 동기화가 깨진 경우, INSERT INTO fts_table(fts_table) VALUES('rebuild')로 전체 재구축한다. 대형 테이블에서는 수 초가 소요될 수 있다."
  tags: ["fts", "trigger", "rebuild"]

- key: insight.migration-rollback-strategy
  category: insight
  content: "SQLite는 ALTER TABLE DROP COLUMN을 지원하지 않으므로, schema migration 롤백 시에는 새 테이블 생성 후 데이터 복사 방식을 사용해야 한다."
  tags: ["sqlite", "migration", "rollback"]
